<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3b82f6">
  <meta name="description" content="Beautiful monthly schedule PWA app">
  <title>Monthly Schedule</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">

  <!-- Styles -->
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/calendar.css">
  <link rel="stylesheet" href="styles/dark.css">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <h1 class="app-title">LULU's Monthly Schedule</h1>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="btn-export" title="Print / Export">
        <i data-lucide="printer"></i>
      </button>
      <button class="icon-btn" id="btn-lang" title="Toggle Language">
        <i data-lucide="languages"></i>
      </button>
      <button class="icon-btn" id="btn-dark-mode" title="Dark Mode">
        <i data-lucide="moon"></i>
      </button>
    </div>
  </header>

  <!-- Main Calendar -->
  <main class="calendar-container">
    <!-- Month Navigation -->
    <div class="month-nav">
      <button class="nav-btn" id="btn-prev-month">
        <i data-lucide="chevron-left"></i>
      </button>
      <h2 class="month-title" id="month-title">April 2026</h2>
      <button class="nav-btn" id="btn-next-month">
        <i data-lucide="chevron-right"></i>
      </button>
    </div>

    <!-- Weekday Headers -->
    <div class="weekday-header">
      <span class="weekday">Mon</span>
      <span class="weekday">Tue</span>
      <span class="weekday">Wed</span>
      <span class="weekday">Thu</span>
      <span class="weekday">Fri</span>
      <span class="weekday weekend">Sat</span>
      <span class="weekday weekend">Sun</span>
    </div>

    <!-- Calendar Grid -->
    <div class="calendar-grid" id="calendar-grid"></div>

    <!-- Legend -->
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background: var(--color-day)"></span>Day Shift</span>
      <span class="legend-item"><span class="legend-dot" style="background: var(--color-night)"></span>Night Shift</span>
      <span class="legend-item"><span class="legend-dot" style="background: var(--color-rest)"></span>Day Off</span>
      <span class="legend-item"><span class="legend-dot" style="background: var(--color-personal)"></span>Personal Leave</span>
      <span class="legend-item"><span class="legend-dot" style="background: var(--color-sick)"></span>Sick Leave</span>
      <span class="legend-item"><span class="legend-dot" style="background: var(--color-annual)"></span>Annual Leave</span>
    </div>
  </main>

  <!-- Status Bar -->
  <div class="status-bar" id="status-bar">
    <div class="status-time" id="status-time"></div>
    <div class="status-shift" id="status-shift"></div>
    <div class="status-payday" id="status-payday"></div>
    <div class="status-weather" id="status-weather"></div>
    <div class="status-version" id="status-version"></div>
  </div>

  <!-- Status Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="status-modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-date">April 15</h3>
        <button class="modal-close" id="modal-close">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="status-options" id="status-options">
          <button class="status-btn" data-status="day">
            <span class="status-dot" style="background: var(--color-day)"></span>
            Day Shift
          </button>
          <button class="status-btn" data-status="night">
            <span class="status-dot" style="background: var(--color-night)"></span>
            Night Shift
          </button>
          <button class="status-btn" data-status="rest">
            <span class="status-dot" style="background: var(--color-rest)"></span>
            Day Off
          </button>
          <button class="status-btn" data-status="personal">
            <span class="status-dot" style="background: var(--color-personal)"></span>
            Personal Leave
          </button>
          <button class="status-btn" data-status="sick">
            <span class="status-dot" style="background: var(--color-sick)"></span>
            Sick Leave
          </button>
          <button class="status-btn" data-status="annual">
            <span class="status-dot" style="background: var(--color-annual)"></span>
            Annual Leave
          </button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger" id="btn-delete">
          <i data-lucide="trash-2"></i>
          Delete
        </button>
        <button class="btn btn-primary" id="btn-save">
          <i data-lucide="save"></i>
          Save
        </button>
      </div>
    </div>
  </div>

  <!-- Summary Modal -->
  <div class="modal-overlay" id="summary-overlay">
    <div class="modal" id="summary-modal">
      <div class="modal-header">
        <h3 class="modal-title" id="summary-title">Summary</h3>
        <button class="modal-close" id="summary-close">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="modal-body" id="summary-body"></div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast">
    <span class="toast-message" id="toast-message">Saved successfully</span>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay" style="display: none;">
    <div class="spinner"></div>
  </div>

  <!-- Scripts -->
  <script src="scripts/pwa.js"></script>
  <script src="scripts/dark-mode.js"></script>
  <script src="scripts/language.js"></script>
  <script src="scripts/gist.js"></script>
  <script src="scripts/calendar.js"></script>
  <script src="scripts/export.js"></script>
  <script src="scripts/weather.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
